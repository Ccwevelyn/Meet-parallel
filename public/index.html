<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>在平行时空再见</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Long+Cang&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- 入口：诗句 -->
    <section id="screen-intro" class="screen active">
      <div class="poem">
        <p>在平行时空相遇</p>
        <p>倘若在那天，我们说出了不一样的话，<br>做出了不一样的选择，<br>结果是否会有所不同。</p>
      </div>
      <div id="choice-boxes" class="choice-boxes hidden">
        <a href="#" id="choice-observe" class="choice-box">观</a>
        <a href="#" id="choice-edit" class="choice-box">改</a>
      </div>
    </section>

    <!-- 观：只读聊天 -->
    <section id="screen-observe" class="screen">
      <header class="chat-header">
        <span class="back" id="back-from-observe">←</span>
        <span class="title">观</span>
      </header>
      <div class="date-bar">
        <label for="observe-date">按日期：</label>
        <select id="observe-date" class="date-select">
          <option value="">全部</option>
        </select>
      </div>
      <div id="observe-messages" class="messages"></div>
    </section>

    <!-- 改：登录 -->
    <section id="screen-login" class="screen">
      <header class="chat-header">
        <span class="back" id="back-from-login">←</span>
        <span class="title">改 · 登录</span>
      </header>
      <form id="login-form" class="login-form">
        <label>用户名</label>
        <input type="text" id="login-username" placeholder="群成员昵称/英文名，或 admin 管理员" autocomplete="username">
        <label>密码</label>
        <input type="password" id="login-password" placeholder="密码" autocomplete="current-password">
        <p id="login-error" class="error hidden"></p>
        <button type="submit">进入</button>
      </form>
    </section>
    <!-- 管理员：微调人设 -->
    <section id="screen-admin" class="screen">
      <header class="chat-header">
        <span class="back" id="back-from-admin">←</span>
        <span class="title">管理 · 微调人设（发消息时间等）</span>
      </header>
      <div id="admin-hint" class="admin-hint">可调整各成员活跃时段（0–23 点）和样本消息，保存后群聊 AI 会按此表现。</div>
      <div id="admin-personas" class="admin-personas"></div>
    </section>

    <!-- 改：聊天（已登录） -->
    <section id="screen-chat" class="screen">
      <header class="chat-header">
        <span class="back" id="back-from-chat">←</span>
        <span class="title">改 · <span id="my-identity"></span></span>
        <span class="edit-profile-btn" id="edit-profile-btn">编辑资料</span>
        <span class="collect-btn" id="collect-btn">采集语气</span>
      </header>
      <div class="date-bar">
        <label for="chat-date">按日期：</label>
        <select id="chat-date" class="date-select">
          <option value="">全部</option>
        </select>
      </div>
      <div id="chat-messages" class="messages"></div>
      <form id="chat-form" class="chat-form">
        <input type="text" id="chat-input" placeholder="输入消息..." maxlength="2000" autocomplete="off">
        <button type="submit">发送</button>
      </form>
    </section>
    <!-- 改：对话采集（和 AI 聊 10 分钟） -->
    <section id="screen-collect" class="screen">
      <header class="chat-header">
        <span class="back" id="back-from-collect">←</span>
        <span class="title">对话采集 · 和 AI 聊 10 分钟</span>
      </header>
      <div id="collect-intro" class="collect-intro">
        <p>和 AI 随意聊约 10 分钟，你的回复会用来学习你的语气，并和已有聊天记录一起生成人设。</p>
        <button type="button" id="collect-start-btn" class="collect-start-btn">开始采集</button>
      </div>
      <div id="collect-chat" class="collect-chat hidden">
        <div id="collect-countdown" class="collect-countdown">剩余 10:00</div>
        <div id="collect-messages" class="messages collect-messages"></div>
        <form id="collect-form" class="chat-form">
          <input type="text" id="collect-input" placeholder="回复 AI..." maxlength="2000" autocomplete="off">
          <button type="submit">发送</button>
          <button type="button" id="collect-end-btn" class="collect-end-btn">结束并合并人设</button>
        </form>
      </div>
      <div id="collect-done" class="collect-done hidden">
        <p id="collect-done-msg">采集已结束，已合并到人设。</p>
        <button type="button" id="collect-done-back">返回聊天</button>
      </div>
    </section>
    <!-- 弹窗：查看人物小传 -->
    <div id="profile-view-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-box profile-view-box">
        <span class="modal-close" id="profile-view-close">×</span>
        <div class="profile-view-avatar"></div>
        <div class="profile-view-name"></div>
        <div class="profile-view-bio"></div>
      </div>
    </div>
    <!-- 弹窗：编辑头像与人物小传 -->
    <div id="profile-edit-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-box profile-edit-box">
        <span class="modal-close" id="profile-edit-close">×</span>
        <h3>编辑头像与人物小传</h3>
        <div class="profile-edit-avatar-wrap"><img id="profile-edit-avatar-preview" src="" alt=""></div>
        <input type="file" id="profile-edit-avatar-input" accept="image/jpeg,image/png,image/gif,image/webp">
        <label>人物小传</label>
        <textarea id="profile-edit-bio" rows="4" placeholder="写一段关于自己的小传..."></textarea>
        <hr class="profile-edit-divider">
        <label>修改密码（选填）</label>
        <input type="password" id="profile-edit-old-pwd" placeholder="当前密码" autocomplete="current-password">
        <input type="password" id="profile-edit-new-pwd" placeholder="新密码（不少于6位）" autocomplete="new-password">
        <p id="profile-edit-status" class="status hidden"></p>
        <button type="button" id="profile-edit-save">保存</button>
      </div>
    </div>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
